{% extends "base.html" %}

{% block content %}
<section class="py-5" style="min-height: 70vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="text-center mb-4">
                    <i class="bi bi-music-note-beamed" style="font-size: 2.5rem; color: var(--mariachi-red, #8B0000);"></i>
                    <h2 class="mt-2 fw-bold">Musicians Portal</h2>
                    <p class="text-muted">Sign in to access the portal</p>
                </div>

                <div class="card shadow">
                    <div class="card-body p-4">
                        <form method="post" action="{% url 'login' %}">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="id_username" class="form-label fw-semibold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                    <input type="text" class="form-control" id="id_username"
                                           name="username" placeholder="Enter your username"
                                           value="{{ request.POST.username|default:'' }}"
                                           autofocus required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="id_password" class="form-label fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control" id="id_password"
                                           name="password" placeholder="Enter your password"
                                           required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-danger w-100 fw-semibold">
                                <i class="bi bi-box-arrow-in-right"></i> Sign In
                            </button>
                        </form>

                        <div class="d-flex align-items-center my-3">
                            <hr class="flex-grow-1">
                            <span class="px-2 text-muted small">or</span>
                            <hr class="flex-grow-1">
                        </div>

                        <a href="{% url 'social:begin' 'google-oauth2' %}" class="btn btn-outline-secondary w-100 fw-semibold d-flex align-items-center justify-content-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                                <path fill="#EA4335" d="M24 9.5c3.15 0 5.64 1.08 7.75 2.84l5.77-5.77C33.95 3.48 29.3 1.5 24 1.5 14.98 1.5 7.3 6.96 3.96 14.64l6.73 5.23C12.4 13.4 17.7 9.5 24 9.5z"/>
                                <path fill="#4285F4" d="M46.1 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.42c-.54 2.9-2.18 5.36-4.65 7.02l7.18 5.57C43.16 37.17 46.1 31.3 46.1 24.5z"/>
                                <path fill="#FBBC05" d="M10.69 28.13A14.56 14.56 0 0 1 9.5 24c0-1.43.22-2.82.59-4.13L3.36 14.64A22.44 22.44 0 0 0 1.5 24c0 3.66.87 7.12 2.42 10.18l6.77-6.05z"/>
                                <path fill="#34A853" d="M24 46.5c5.3 0 9.74-1.75 12.99-4.76l-7.18-5.57c-1.78 1.2-4.07 1.9-5.81 1.9-6.3 0-11.6-3.9-13.31-9.37l-6.77 6.05C7.3 41.04 14.98 46.5 24 46.5z"/>
                            </svg>
                            Sign in with Google
                        </a>
                    </div>
                </div>

                <p class="text-center text-muted mt-3 small">
                    Don't have an account? Contact Gerry to get access.
                </p>

            </div>
        </div>
    </div>
</section>
{% endblock %}
