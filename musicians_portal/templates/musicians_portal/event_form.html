{% extends "base.html" %}

{% block content %}
<div class="container py-4" style="max-width:600px;">

  <a href="{% url 'portal_calendar' %}" class="btn btn-outline-secondary btn-sm mb-4">
    <i class="bi bi-arrow-left me-1"></i>Back to Calendar
  </a>

  <div class="card border-0 shadow-sm">
    <div class="card-header bg-danger text-white py-3">
      <h2 class="h5 mb-0"><i class="bi bi-calendar-plus me-2"></i>{{ page_title }}</h2>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
          <input type="text" name="title" required class="form-control"
                 placeholder="e.g. Quinceanera – Garcia Family"
                 value="{% if event %}{{ event.title }}{% endif %}">
        </div>

        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Type</label>
            <select name="event_type" class="form-select">
              <option value="gig"       {% if event.event_type == 'gig' %}selected{% endif %}>🎺 Gig</option>
              <option value="rehearsal" {% if event.event_type == 'rehearsal' %}selected{% endif %}>🎙 Rehearsal</option>
              <option value="other"     {% if event.event_type == 'other' %}selected{% endif %}>📅 Other</option>
            </select>
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Date <span class="text-danger">*</span></label>
            <input type="date" name="date" required class="form-control"
                   value="{% if event %}{{ event.date|date:'Y-m-d' }}{% endif %}">
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Start Time</label>
            <input type="time" name="start_time" id="id_start_time" class="form-control"
                   value="{% if event and event.start_time %}{{ event.start_time|time:'H:i' }}{% endif %}">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">End Time</label>
            <input type="time" name="end_time" id="id_end_time" class="form-control"
                   value="{% if event and event.end_time %}{{ event.end_time|time:'H:i' }}{% endif %}">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Venue</label>
          <input type="text" name="venue" class="form-control"
                 placeholder="e.g. El Torito Banquet Hall"
                 value="{% if event %}{{ event.venue }}{% endif %}">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Client / Host</label>
          <input type="text" name="client" class="form-control"
                 placeholder="e.g. Garcia Family"
                 value="{% if event %}{{ event.client }}{% endif %}">
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Notes</label>
          <textarea name="notes" rows="3" class="form-control"
                    placeholder="Dress code, song requests, parking, etc.">{% if event %}{{ event.notes }}{% endif %}</textarea>
        </div>

        <!-- Financials (admin/lead only — always true here since view restricts access) -->
        <div class="border-top pt-3 mb-4">
          <p class="fw-semibold text-muted small mb-3"><i class="bi bi-cash-stack me-1"></i>Financials <span class="badge bg-warning text-dark ms-1">Admin / Lead only</span></p>
          <div class="row g-3">
            <div class="col-sm-4">
              <label class="form-label fw-semibold mb-0" style="white-space:nowrap;">Billed Hours <small class="text-muted fw-normal">(optional)</small></label>
              <input type="number" name="billed_hours" id="id_billed_hours" class="form-control" step="0.25" min="0"
                     placeholder="e.g. 7"
                     value="{% if event and event.billed_hours %}{{ event.billed_hours }}{% endif %}">
              <div class="form-text" id="billed-hours-hint">Auto-filled from event time</div>
            </div>
            <div class="col-sm-4">
              <label class="form-label fw-semibold mb-0" style="white-space:nowrap;">Rate / Hour <small class="text-muted fw-normal">(optional)</small></label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" name="rate_per_hour" id="id_rate_per_hour" class="form-control" step="0.01" min="0"
                       placeholder="—"
                       value="{% if event and event.rate_per_hour %}{{ event.rate_per_hour }}{% endif %}">
              </div>
            </div>
            <div class="col-sm-4">
              <label class="form-label fw-semibold mb-0" style="white-space:nowrap;">Total Charged <small class="text-muted fw-normal">(optional)</small></label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" name="total_charged" id="id_total_charged" class="form-control" step="0.01" min="0"
                       placeholder="—"
                       value="{% if event and event.total_charged %}{{ event.total_charged }}{% endif %}">
              </div>
              <div class="form-text" id="total-charged-hint"></div>
            </div>
          </div>
        </div>

        <script>
        (function () {
          var startInput  = document.getElementById('id_start_time');
          var endInput    = document.getElementById('id_end_time');
          var hoursInput  = document.getElementById('id_billed_hours');
          var hoursHint   = document.getElementById('billed-hours-hint');
          var rateInput   = document.getElementById('id_rate_per_hour');
          var totalInput  = document.getElementById('id_total_charged');
          var totalHint   = document.getElementById('total-charged-hint');
          var hoursEdited = false;
          var totalEdited = false;

          function recalcTotal() {
            if (totalEdited) return;
            var hours = parseFloat(hoursInput.value) || 0;
            var rate  = parseFloat(rateInput.value)  || 0;
            if (hours > 0 && rate > 0) {
              totalInput.value = (hours * rate).toFixed(2);
              totalHint.textContent = 'Auto-calculated (' + hours + ' hrs × $' + rate + ')';
            } else {
              totalHint.textContent = '';
            }
          }

          function calcHours() {
            if (hoursEdited) return;
            var start = startInput.value;
            var end   = endInput.value;
            if (!start || !end) return;
            var sp = start.split(':').map(Number);
            var ep = end.split(':').map(Number);
            var startMins = sp[0] * 60 + sp[1];
            var endMins   = ep[0] * 60 + ep[1];
            if (endMins <= startMins) endMins += 24 * 60; // overnight
            var diff = (endMins - startMins) / 60;
            if (diff > 0) {
              hoursInput.value = diff.toFixed(2);
              hoursHint.textContent = 'Auto from event time (' + start + '–' + end + ')';
              recalcTotal();
            }
          }

          hoursInput.addEventListener('input', function () {
            hoursEdited = true;
            hoursHint.textContent = 'Manually set';
            recalcTotal();
          });
          hoursInput.addEventListener('change', function () {
            if (!hoursInput.value) { hoursEdited = false; hoursHint.textContent = ''; calcHours(); }
          });

          totalInput.addEventListener('input', function () {
            totalEdited = true;
            totalHint.textContent = 'Manually set';
          });
          totalInput.addEventListener('change', function () {
            if (!totalInput.value) { totalEdited = false; totalHint.textContent = ''; recalcTotal(); }
          });

          startInput.addEventListener('change', calcHours);
          endInput.addEventListener('change', calcHours);
          hoursInput.addEventListener('input', recalcTotal);
          rateInput.addEventListener('input', recalcTotal);

          // Run on page load for new events
          {% if not event or not event.billed_hours %}
          calcHours();
          {% elif not event.total_charged %}
          recalcTotal();
          {% endif %}
        })();
        </script>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-check-lg me-1"></i>Save Event
          </button>
          <a href="{% url 'portal_calendar' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>

</div>
{% endblock %}
