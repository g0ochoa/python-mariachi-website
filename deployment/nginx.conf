# Nginx configuration for Mariachi Todo Terreno Django app
# Place this file in: /etc/nginx/sites-available/mariachi-website
# Then create symlink: sudo ln -s /etc/nginx/sites-available/mariachi-website /etc/nginx/sites-enabled/

upstream mariachi_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name YOUR_SERVER_IP_OR_DOMAIN;  # Change this to your Ubuntu server IP or domain
    
    client_max_body_size 10M;
    
    # Logging
    access_log /var/log/nginx/mariachi-website-access.log;
    error_log /var/log/nginx/mariachi-website-error.log;
    
    # Static files
    location /static/ {
        alias /var/www/mariachi-website/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Media files (user uploads)
    location /media/ {
        alias /var/www/mariachi-website/media/;
        expires 7d;
    }
    
    # Django application
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_buffering off;
        
        proxy_pass http://mariachi_app;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
